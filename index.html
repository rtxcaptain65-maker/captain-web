<!DOCTYPE html>
<html>
<head>
<title>เว็บของกัปตัน</title>
</head>
<body>

<h1 style="font-size:50px;">สวัสดี นี่คือเว็บแรกของกัปตัน</h1>
<p style="font-size:50px;">ถ้ามึงเปิดหน้านี้ได้แปลว่ามึงกำลังโดนเกรียน</p>
<button style="font-size:50px;" onclick="goToSite()">ไป google</button>

<button style="font-size:50px;" onclick="showImage()">กดเปิดปิดรูป</button>

<button style="font-size:50px;" onclick="playSound()">กดเล่นเสียง</button>
<button style="font-size:50px;" onclick="myVi()">กดเล่นวิดิโอ</button>

<br><br>

<video id="myVideo" width="0" height="0">
  <source src="https://vocal-ivory-hp8cjjaqhd.edgeone.app/VID_20260309_185725.mp4" type="video/mp4">
</video>

<audio id="sound">
  <source src="https://right-chocolate-ozynw1ohcw.edgeone.app/61b87ec0746167e845d4ddc8a88c1844.mp3">
</audio>

<audio id="sound_1">
  <source src="https://sensible-moccasin-mpxrz6i0vj.edgeone.app/VID_20260309_192909.mp3" type="audio/mpeg">
</audio>

<img id="myImage" src="https://wittering-indigo-agdiu6q9xm.edgeone.app/70f7a070665b34a456809a905eb5f45e.jpg" width="300" style="display:none;">

<script>
function showImage(){
let ss = document.getElementById("sound");
let su = document.getElementById("sound_1");
let img = document.getElementById("myImage");
let vid = document.getElementById("myVideo");

if(img.style.display === "none"){

    vid.pause();
    vid.width = 0;
    vid.height = 0;
    su.play();
    img.style.display = "block";
    ss.pause();
}else{

    img.style.display = "none";
    su.play();
}

}

function playSound() {
  let ss = document.getElementById("sound")
  let img = document.getElementById("myImage");
  let vid = document.getElementById("myVideo");
  if(ss.paused){
   img.style.display = "none"
   vid.pause();
   vid.width = 0;
   vid.height = 0;
   ss.play();
  }else{
    ss.pause();
    
  }
}

function goToSite() {
  document.getElementById("sound_1").play();
  window.location.href = "https://google.com";
  document.getElementById("sound").pause();
  document.getElementById("myVideo").pause();
}

function myVi(){
let ss = document.getElementById("sound");   
let sud = document.getElementById("sound_1");
let vid = document.getElementById("myVideo");
let img = document.getElementById("myImage");

if(vid.paused){
ss.pause();
img.style.display = "none";
vid.width = 500;
vid.height = 300;
vid.play();
sud.play();
}else{

vid.pause();
vid.width = 0;
vid.height = 0;
sud.play();
}

}

</script>

</body>
</html>
